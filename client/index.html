<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0f1724;--card:#0b1220;--accent:#7c3aed;--muted:#94a3b8;--glass:rgba(255,255,255,0.04)}
        *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
        body{margin:0;min-height:100vh;background:linear-gradient(180deg,#071023 0%, #071a2f 60%), radial-gradient(600px 400px at 10% 10%, rgba(124,58,237,0.08), transparent 10%);display:flex;align-items:center;justify-content:center;padding:32px;color:#e6eef8}
        .container{width:100%;max-width:760px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:16px;padding:36px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(2,6,23,0.6)}
        header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
        .logo{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 6px 18px rgba(124,58,237,0.18)}
        h1{font-size:20px;margin:0}
        p.lead{margin:4px 0 0;color:var(--muted);font-size:14px}
        form{display:grid;grid-template-columns:1fr;gap:12px;margin-top:18px}
        input[type="email"], input[type="text"], textarea{background:var(--glass);border:1px solid rgba(255,255,255,0.04);padding:14px 16px;border-radius:10px;color:#e6eef8;outline:none;font-size:14px}
        input::placeholder, textarea::placeholder{color:rgba(230,238,248,0.45)}
        textarea{min-height:140px;resize:vertical}
        .row{display:grid;grid-template-columns:1fr 120px;gap:12px}
        .submit-btn{background:linear-gradient(90deg,var(--accent),#4f46e5);border:none;color:white;padding:12px 18px;border-radius:10px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(79,70,229,0.18);transition:transform .12s ease,box-shadow .12s ease}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(79,70,229,0.22)}
        .meta{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:12px;color:var(--muted);font-size:13px}
        @media (max-width:520px){.row{grid-template-columns:1fr} .logo{width:44px;height:44px}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ES</div>
            <div>
                <h1>Welcome to Email Service</h1>
                <p class="lead">Quickly send emails — lightweight and beautiful.</p>
            </div>
        </header>

        <form id="emailForm">
            <input type="email" id = "to" name="to" placeholder="Recipient email" required>
            <div class="row">
                <input id = "subject" type="text" name="subject" placeholder="Subject">
                <input class="submit-btn" type="submit" value="Send">
            </div>
            <textarea id = "body" name="body" placeholder="Write your message here..."></textarea>
        </form>

        <div id="status"></div>

    </div>
    <script src="http://localhost:4000/socket.io/socket.io.js"></script>
    <script src="index.js"></script>
</body>
</html>
